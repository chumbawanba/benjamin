services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: benjamin
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d benjamin"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/benjamin
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/srv
      - frontend_node_modules:/srv/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
