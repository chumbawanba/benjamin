services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: benjamin
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d benjamin"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/benjamin
    ports:
      - "8000:8000"  # acessível na rede local (ex: telemóvel) — ver CLAUDE.md
    volumes:
      - ./backend:/srv
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    # sem VITE_API_BASE_URL: o client.ts deriva o host da API a partir de
    # window.location.hostname, para funcionar tanto em localhost como no
    # telemóvel (via IP da rede local).
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/srv
      - frontend_node_modules:/srv/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
