# SPA fallback: qualquer rota que não seja um ficheiro real (ex: /workspace,
# /portfolio) devolve o index.html, para o React Router tratar do routing no
# cliente. Usado só na imagem de produção (Dockerfile.prod) — o dev server do
# Vite (docker-compose.yml) já trata disto sozinho.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
