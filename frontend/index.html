<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07423e" />
    <title>Benjamin</title>
    <script>
      // Aplica o tema guardado antes do React montar, para evitar flash do tema errado.
      (function () {
        var stored = localStorage.getItem('benjamin_theme');
        if (stored !== 'light') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
