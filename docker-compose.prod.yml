# Stack de produção (Fase 7, ver ROADMAP.md e CLAUDE.md secção Segurança).
# Diferenças chave face ao docker-compose.yml de dev:
# - Postgres e API não expõem portas ao host — só o Caddy fala com eles, via
#   rede interna do Docker Compose.
# - Frontend é uma imagem nginx com o build estático do Vite (Dockerfile.prod),
#   não o dev server.
# - Caddy expõe 80/443 publicamente e trata HTTPS automático (Let's Encrypt).
# - api corre sem --reload.
#
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD no .env}
      POSTGRES_DB: benjamin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d benjamin"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD}@db:5432/benjamin
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: https://beta.appbenjamin.com/api/v1
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./landing:/srv/landing
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
